<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sec-Dashboard</title>
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --bg-card: #1c2128;
            --border: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --green: #3fb950;
            --yellow: #d29922;
            --red: #f85149;
            --orange: #d18616;
            --purple: #bc8cff;
            --pink: #f778ba;
            --radius: 8px;
            --radius-lg: 12px;
            --shadow: 0 2px 8px rgba(0,0,0,0.3);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.4);
            --transition: all 0.2s ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg-primary); color: var(--text-primary); line-height: 1.5; overflow: hidden; height: 100vh; }

        /* Layout */
        .app { display: flex; height: 100vh; }
        .sidebar { width: 260px; min-width: 260px; background: var(--bg-secondary); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
        .sidebar-header h1 { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .sidebar-header .version { font-size: 11px; color: var(--text-muted); background: var(--bg-tertiary); padding: 2px 6px; border-radius: 4px; }
        .nav-section { padding: 12px 8px 4px 16px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 16px; margin: 2px 8px; border-radius: var(--radius); cursor: pointer; transition: var(--transition); font-size: 14px; color: var(--text-secondary); text-decoration: none; }
        .nav-item:hover { background: var(--bg-tertiary); color: var(--text-primary); }
        .nav-item.active { background: rgba(88,166,255,0.1); color: var(--accent); }
        .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
        .nav-item .badge { margin-left: auto; background: var(--bg-tertiary); padding: 1px 6px; border-radius: 10px; font-size: 11px; color: var(--text-muted); }

        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { height: 56px; min-height: 56px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; gap: 16px; }
        .topbar h2 { font-size: 16px; font-weight: 600; }
        .topbar .breadcrumb { color: var(--text-muted); font-size: 13px; }
        .topbar .spacer { flex: 1; }
        .topbar .ws-status { font-size: 12px; display: flex; align-items: center; gap: 4px; }
        .topbar .ws-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
        .topbar .ws-dot.disconnected { background: var(--red); }
        .content { flex: 1; overflow-y: auto; padding: 24px; }

        /* Cards */
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 16px; }
        .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .card-title { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }

        /* Buttons */
        .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius); font-size: 13px; font-weight: 500; cursor: pointer; transition: var(--transition); border: 1px solid var(--border); background: var(--bg-tertiary); color: var(--text-primary); }
        .btn:hover { border-color: var(--text-muted); transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        .btn-primary { background: #238636; border-color: #2ea043; }
        .btn-primary:hover { background: #2ea043; }
        .btn-danger { background: #da3633; border-color: #f85149; }
        .btn-danger:hover { background: #f85149; }
        .btn-accent { background: rgba(88,166,255,0.15); border-color: var(--accent); color: var(--accent); }
        .btn-accent:hover { background: rgba(88,166,255,0.25); }
        .btn-sm { padding: 4px 10px; font-size: 12px; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* Inputs */
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 12px; font-weight: 500; margin-bottom: 4px; color: var(--text-secondary); }
        input[type="text"], input[type="number"], select, textarea {
            width: 100%; padding: 8px 12px; background: var(--bg-primary); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text-primary); font-size: 14px; transition: var(--transition); font-family: inherit;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(88,166,255,0.2); }

        /* Grid */
        .grid { display: grid; gap: 16px; }
        .grid-2 { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
        .grid-3 { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
        .grid-4 { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }

        /* Tool Cards */
        .tool-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; cursor: pointer; transition: var(--transition); position: relative; overflow: hidden; }
        .tool-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: var(--shadow); }
        .tool-card.running { border-color: var(--yellow); }
        .tool-card.running::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--yellow), var(--orange)); animation: shimmer 1.5s infinite; }
        .tool-card.success { border-color: var(--green); }
        .tool-card.success::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--green); }
        .tool-card.error { border-color: var(--red); }
        .tool-card.error::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--red); }
        @keyframes shimmer { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
        .tool-card .icon { font-size: 24px; margin-bottom: 8px; }
        .tool-card .name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
        .tool-card .desc { font-size: 12px; color: var(--text-secondary); line-height: 1.4; }
        .tool-card .category-tag { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 500; margin-top: 8px; }
        .tool-card .elapsed { position: absolute; top: 8px; right: 8px; font-size: 11px; color: var(--text-muted); font-family: monospace; }

        /* Category Colors */
        .cat-network { background: rgba(88,166,255,0.15); color: var(--accent); }
        .cat-web { background: rgba(188,140,255,0.15); color: var(--purple); }
        .cat-vuln { background: rgba(248,81,73,0.15); color: var(--red); }
        .cat-system { background: rgba(63,185,80,0.15); color: var(--green); }
        .cat-osint { background: rgba(247,120,186,0.15); color: var(--pink); }

        /* Target list */
        .target-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; transition: var(--transition); }
        .target-item:hover { border-color: var(--text-muted); }
        .target-item.active { border-color: var(--accent); background: rgba(88,166,255,0.05); }
        .target-item .name { font-weight: 600; font-size: 14px; }
        .target-item .host { font-size: 12px; color: var(--text-secondary); font-family: monospace; }
        .target-item .actions { margin-left: auto; display: flex; gap: 6px; }

        /* Results */
        .result-panel { background: var(--bg-primary); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-top: 12px; max-height: 600px; overflow-y: auto; }
        .result-panel pre { font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 12px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }

        /* Progress Bar */
        .progress-bar { height: 6px; background: var(--bg-tertiary); border-radius: 3px; overflow: hidden; margin: 8px 0; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--purple)); border-radius: 3px; transition: width 0.5s ease; }

        /* Pipeline Phases */
        .phase-item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-left: 3px solid var(--border); margin-bottom: 8px; }
        .phase-item.active { border-left-color: var(--yellow); background: rgba(210,153,34,0.05); }
        .phase-item.done { border-left-color: var(--green); }
        .phase-item .phase-icon { font-size: 18px; }
        .phase-item .phase-name { font-weight: 600; font-size: 14px; }
        .phase-item .phase-tools { font-size: 12px; color: var(--text-secondary); }
        .phase-item .phase-status { margin-left: auto; font-size: 12px; }

        /* Pipeline Selector */
        .pipeline-card { background: var(--bg-card); border: 2px solid var(--border); border-radius: var(--radius-lg); padding: 20px; cursor: pointer; transition: var(--transition); text-align: center; }
        .pipeline-card:hover { border-color: var(--accent); transform: translateY(-2px); }
        .pipeline-card.selected { border-color: var(--accent); background: rgba(88,166,255,0.05); }
        .pipeline-card .pip-icon { font-size: 36px; margin-bottom: 8px; }
        .pipeline-card .pip-name { font-weight: 700; font-size: 16px; margin-bottom: 4px; }
        .pipeline-card .pip-desc { font-size: 12px; color: var(--text-secondary); }

        /* Table */
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 13px; }
        th { font-weight: 600; color: var(--text-secondary); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
        tr:hover td { background: rgba(88,166,255,0.03); }

        /* Status badges */
        .badge-status { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
        .badge-pending { background: rgba(139,148,158,0.2); color: var(--text-secondary); }
        .badge-running { background: rgba(210,153,34,0.2); color: var(--yellow); }
        .badge-completed { background: rgba(63,185,80,0.2); color: var(--green); }
        .badge-failed { background: rgba(248,81,73,0.2); color: var(--red); }

        /* Severity */
        .sev-critical { color: var(--red); font-weight: 700; }
        .sev-high { color: var(--orange); font-weight: 600; }
        .sev-medium { color: var(--yellow); }
        .sev-low { color: var(--text-secondary); }

        /* Empty state */
        .empty-state { text-align: center; padding: 48px 24px; color: var(--text-muted); }
        .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
        .empty-state h3 { font-size: 16px; color: var(--text-secondary); margin-bottom: 8px; }
        .empty-state p { font-size: 13px; max-width: 400px; margin: 0 auto; }

        /* Toast */
        .toast-container { position: fixed; top: 16px; right: 16px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
        .toast { padding: 12px 16px; border-radius: var(--radius); background: var(--bg-card); border: 1px solid var(--border); box-shadow: var(--shadow); display: flex; align-items: center; gap: 8px; font-size: 13px; animation: slideIn 0.3s ease; min-width: 250px; }
        .toast-success { border-left: 3px solid var(--green); }
        .toast-error { border-left: 3px solid var(--red); }
        .toast-info { border-left: 3px solid var(--accent); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 999; animation: fadeIn 0.2s ease; }
        .modal { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; min-width: 400px; max-width: 600px; box-shadow: var(--shadow-lg); }
        .modal h3 { margin-bottom: 16px; font-size: 18px; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Tabs */
        .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
        .tab { padding: 8px 16px; font-size: 13px; cursor: pointer; color: var(--text-secondary); border-bottom: 2px solid transparent; transition: var(--transition); }
        .tab:hover { color: var(--text-primary); }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

        /* Stats row */
        .stats-row { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 20px; min-width: 140px; transition: var(--transition); }
        .stat-card:hover { border-color: var(--text-muted); }
        .stat-card .value { font-size: 28px; font-weight: 700; }
        .stat-card .label { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
        .stat-card.accent .value { color: var(--accent); }
        .stat-card.green .value { color: var(--green); }
        .stat-card.yellow .value { color: var(--yellow); }
        .stat-card.red .value { color: var(--red); }

        /* Search bar */
        .search-bar { position: relative; margin-bottom: 16px; }
        .search-bar input { padding-left: 36px; }
        .search-bar::before { content: ''; position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 14px; z-index: 1; }

        /* Formatted result cards */
        .kv-grid { display: grid; grid-template-columns: 140px 1fr; gap: 4px 12px; font-size: 13px; }
        .kv-grid .key { color: var(--text-secondary); font-weight: 500; }
        .kv-grid .value { color: var(--text-primary); font-family: monospace; word-break: break-all; }
        .result-section { margin-bottom: 16px; }
        .result-section h4 { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; gap: 6px; }
        .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin: 2px; background: var(--bg-tertiary); }
        .tag-green { background: rgba(63,185,80,0.15); color: var(--green); }
        .tag-red { background: rgba(248,81,73,0.15); color: var(--red); }
        .tag-yellow { background: rgba(210,153,34,0.15); color: var(--yellow); }
        .tag-accent { background: rgba(88,166,255,0.15); color: var(--accent); }

        /* Grade badge */
        .grade-badge { display: inline-flex; align-items: center; justify-content: center; width: 48px; height: 48px; border-radius: 50%; font-size: 20px; font-weight: 700; }
        .grade-A { background: rgba(63,185,80,0.2); color: var(--green); border: 2px solid var(--green); }
        .grade-B { background: rgba(88,166,255,0.2); color: var(--accent); border: 2px solid var(--accent); }
        .grade-C { background: rgba(210,153,34,0.2); color: var(--yellow); border: 2px solid var(--yellow); }
        .grade-D { background: rgba(209,134,22,0.2); color: var(--orange); border: 2px solid var(--orange); }
        .grade-F { background: rgba(248,81,73,0.2); color: var(--red); border: 2px solid var(--red); }

        /* Strength bar */
        .strength-bar { height: 8px; border-radius: 4px; background: var(--bg-tertiary); overflow: hidden; margin: 8px 0; }
        .strength-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }

        /* Open port row */
        .port-row { display: flex; align-items: center; gap: 12px; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
        .port-row:last-child { border-bottom: none; }
        .port-num { font-family: monospace; font-weight: 600; min-width: 60px; color: var(--accent); }
        .port-state { min-width: 50px; }
        .port-service { color: var(--text-secondary); }

        /* Finding card */
        .finding-card { background: var(--bg-primary); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; margin-bottom: 8px; }
        .finding-card.vuln { border-left: 3px solid var(--red); }
        .finding-card.safe { border-left: 3px solid var(--green); }
        .finding-card.warn { border-left: 3px solid var(--yellow); }

        /* CVE card */
        .cve-card { background: var(--bg-primary); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; margin-bottom: 8px; }
        .cve-card .cve-id { font-family: monospace; font-weight: 600; font-size: 14px; }
        .cve-card .cve-desc { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
        .cve-card .cve-score { font-size: 18px; font-weight: 700; float: right; }

        /* Skeleton loader */
        .skeleton { background: linear-gradient(90deg, var(--bg-tertiary) 25%, var(--border) 50%, var(--bg-tertiary) 75%); background-size: 200% 100%; animation: skeleton-pulse 1.5s infinite; border-radius: 4px; height: 16px; margin-bottom: 8px; }
        @keyframes skeleton-pulse { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .hidden { display: none !important; }

        /* Dashboard responsive */
        @media (max-width: 1000px) {
            .dash-grid { grid-template-columns: 1fr !important; }
        }
        .flex { display: flex; }
        .gap-8 { gap: 8px; }
        .gap-16 { gap: 16px; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .mt-8 { margin-top: 8px; }
        .mt-16 { margin-top: 16px; }
        .mb-8 { margin-bottom: 8px; }
        .mb-16 { margin-bottom: 16px; }
        .text-center { text-align: center; }
    </style>
</head>
<body>
    <div class="app">
        <nav class="sidebar">
            <div class="sidebar-header">
                <h1> Sec-Dashboard <span class="version">v1.0</span></h1>
            </div>
            <div class="nav-section">Navigation</div>
            <a class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
                <span class="icon"></span> Dashboard
            </a>
            <a class="nav-item" data-page="tools" onclick="navigate('tools')">
                <span class="icon"></span> Tools <span class="badge" id="tools-count">27</span>
            </a>
            <a class="nav-item" data-page="pipeline" onclick="navigate('pipeline')">
                <span class="icon"></span> Pipeline
            </a>
            <a class="nav-item" data-page="targets" onclick="navigate('targets')">
                <span class="icon"></span> Targets
            </a>
            <a class="nav-item" data-page="history" onclick="navigate('history')">
                <span class="icon"></span> History
            </a>
            <a class="nav-item" data-page="guide" onclick="navigate('guide')">
                <span class="icon">?</span> Guide
            </a>
            <a class="nav-item" data-page="proxy" onclick="navigate('proxy')">
                <span class="icon">Px</span> Proxy
            </a>
            <div class="nav-section" style="margin-top: 16px;">Categories</div>
            <a class="nav-item" onclick="filterCategory('Network Recon')">
                <span class="icon"></span> Network Recon
            </a>
            <a class="nav-item" onclick="filterCategory('Web Security')">
                <span class="icon"></span> Web Security
            </a>
            <a class="nav-item" onclick="filterCategory('Vulnerability')">
                <span class="icon"></span> Vulnerability
            </a>
            <a class="nav-item" onclick="filterCategory('System')">
                <span class="icon"></span> System
            </a>
            <a class="nav-item" onclick="filterCategory('OSINT')">
                <span class="icon">OS</span> OSINT
            </a>
            <div style="flex:1"></div>
            <div style="padding: 16px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text-muted);">
                <div>27 tools • 5 categories</div>
                <div>Pure Python • No deps</div>
            </div>
        </nav>
        <div class="main">
            <div class="topbar">
                <h2 id="page-title">Dashboard</h2>
                <span class="breadcrumb" id="breadcrumb"></span>
                <div class="spacer"></div>
                <div class="ws-status">
                    <div class="ws-dot" id="ws-dot"></div>
                    <span id="ws-label">Connected</span>
                </div>
            </div>
            <div class="content" id="content"></div>
        </div>
    </div>
    <div class="toast-container" id="toasts"></div>

    <script>
    const state = {
        page: 'dashboard', tools: [], targets: [], selectedTarget: null,
        pipelines: {}, ws: null, categoryFilter: null, toolSearch: '',
    };

    const api = {
        async get(path) { const r = await fetch(`/api${path}`); return r.json(); },
        async post(path, data) { const r = await fetch(`/api${path}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) }); return r.json(); },
        async del(path) { const r = await fetch(`/api${path}`, { method: 'DELETE' }); return r.json(); },
    };

    // WebSocket
    function connectWS() {
        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        state.ws = new WebSocket(`${proto}//${location.host}/ws`);
        state.ws.onopen = () => { document.getElementById('ws-dot').className = 'ws-dot'; document.getElementById('ws-label').textContent = 'Connected'; };
        state.ws.onclose = () => { document.getElementById('ws-dot').className = 'ws-dot disconnected'; document.getElementById('ws-label').textContent = 'Disconnected'; setTimeout(connectWS, 3000); };
        state.ws.onmessage = (e) => { try { handleWSEvent(JSON.parse(e.data)); } catch {} };
        setInterval(() => { if (state.ws?.readyState === WebSocket.OPEN) state.ws.send(JSON.stringify({type: 'ping'})); }, 30000);
    }

    function handleWSEvent(event) {
        if (event.type === 'tool_start') toast(` Running ${event.tool}...`, 'info');
        else if (event.type === 'tool_complete') { const s = event.success ? '' : ''; toast(`${s} ${event.tool} (${event.elapsed}s)`, event.success ? 'success' : 'error'); }
        else if (event.type === 'pipeline_complete') { toast(` Pipeline completed in ${event.elapsed}s`, 'success'); if (state.page === 'pipeline') renderPipelinePage(); }
        else if (event.type === 'phase_start') { /* handled by pollPipeline */ }
        else if (event.type === 'scan_complete') { if (state.page === 'history') renderHistoryPage(); if (state.page === 'dashboard') renderDashboard(); }
    }

    // Navigation
    function navigate(page) {
        state.page = page; state.categoryFilter = null;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        const navEl = document.querySelector(`[data-page="${page}"]`);
        if (navEl) navEl.classList.add('active');
        const titles = {dashboard:'Dashboard',tools:'Security Tools',pipeline:'Pipeline Engine',targets:'Targets',history:'Scan History',guide:'User Guide',proxy:'Proxy / Anonymity'};
        document.getElementById('page-title').textContent = titles[page] || page;
        const renderers = {dashboard:renderDashboard,tools:renderTools,pipeline:renderPipelinePage,targets:renderTargets,history:renderHistoryPage,guide:renderGuide,proxy:renderProxy};
        (renderers[page] || renderDashboard)();
    }

    function filterCategory(cat) {
        state.page = 'tools'; state.categoryFilter = cat;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById('page-title').textContent = cat;
        renderTools();
    }

    function toast(msg, type='info') {
        const container = document.getElementById('toasts');
        const el = document.createElement('div');
        el.className = `toast toast-${type}`;
        el.textContent = msg;
        container.appendChild(el);
        setTimeout(() => el.remove(), 4000);
    }

    function esc(str) { return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function catIcon(cat) { return {'Network Recon':'','Web Security':'','Vulnerability':'','System':'','OSINT':'OS'}[cat]||''; }
    function catClass(cat) { return {'Network Recon':'network','Web Security':'web','Vulnerability':'vuln','System':'system','OSINT':'osint'}[cat]||'network'; }

    // ── Dashboard ──────────────────────────────
    function timeAgo(ts) {
        if (!ts) return '-';
        const d = new Date(ts.includes && ts.includes('T') ? ts : ts.replace(' ', 'T') + 'Z');
        const diff = (Date.now() - d.getTime()) / 1000;
        if (diff < 60) return 'just now';
        if (diff < 3600) return Math.floor(diff/60) + 'm ago';
        if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
        return Math.floor(diff/86400) + 'd ago';
    }
    function fmtUptime(sec) {
        if (sec < 60) return sec + 's';
        if (sec < 3600) return Math.floor(sec/60) + 'm';
        const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60);
        return h + 'h ' + m + 'm';
    }
    function statusBadge(s) {
        const m = {completed:'badge-completed',running:'badge-running',pending:'badge-pending',failed:'badge-failed'};
        return `<span class="badge-status ${m[s]||'badge-pending'}">${s}</span>`;
    }

                    ${s.scans_by_tool?.length ? `

                </div>

                <!-- Right column -->
                <div>
                    <!-- System Status -->
                    <div class="card">
                        <div class="card-header"><div class="card-title">System Status</div></div>

                                    <span style="width:10px;height:10px;border-radius:50%;background:var(--yellow);flex-shrink:0"></span>
                                    <span style="flex:1">Running</span>
                                    <span style="font-family:monospace;color:var(--yellow)">${s.scans_by_status.running}</span>

                                ${s.scans_by_status.pending !== undefined ? `
                                <div style="display:flex;align-items:center;gap:8px">
                                    <span style="width:10px;height:10px;border-radius:50%;background:var(--text-muted);flex-shrink:0"></span>
                                    <span style="flex:1">Pending</span>
                                    <span style="font-family:monospace">${s.scans_by_status.pending}</span>

                                ${s.scans_by_status.failed !== undefined ? `
                                <div style="display:flex;align-items:center;gap:8px">
                                    <span style="width:10px;height:10px;border-radius:50%;background:var(--red);flex-shrink:0"></span>
                                    <span style="flex:1">Failed</span>
                                    <span style="font-family:monospace;color:var(--red)">${s.scans_by_status.failed}</span>

                                <!-- Progress bar -->
                                <div class="progress-bar" style="margin-top:4px">
                                    <div class="progress-fill" style="width:${s.success_rate}%;background:linear-gradient(90deg,var(--green),${s.success_rate<50?'var(--yellow)':'var(--accent)'})"></div>
                                </div>
                                <div style="text-align:center;color:var(--text-muted);font-size:11px">${s.success_rate}% success rate</div>
                            </div>
                        ` : '<div style="color:var(--text-muted);font-size:13px;text-align:center;padding:16px">No scans recorded yet</div>'}

    // ── Tools ──────────────────────────────────
    async function renderTools() {
        const content = document.getElementById('content');
        if (!state.tools.length) { const data = await api.get('/tools'); state.tools = data.tools || []; }
        let tools = state.tools;
        if (state.categoryFilter) tools = tools.filter(t => t.category === state.categoryFilter);
        if (state.toolSearch) {
            const q = state.toolSearch.toLowerCase();
            tools = tools.filter(t => t.name.toLowerCase().includes(q) || t.description.toLowerCase().includes(q) || t.id.toLowerCase().includes(q));
        }

        content.innerHTML = `
            <div class="tabs">
                <div class="tab ${!state.categoryFilter?'active':''}" onclick="state.categoryFilter=null;renderTools()">All (${state.tools.length})</div>
                ${['Network Recon','Web Security','Vulnerability','System','OSINT'].map(c =>
                    `<div class="tab ${state.categoryFilter===c?'active':''}" onclick="filterCategory('${c}')">${catIcon(c)} ${c} (${state.tools.filter(t=>t.category===c).length})</div>`
                ).join('')}
            </div>
            <div class="search-bar">
                <input type="text" placeholder="Search tools..." value="${esc(state.toolSearch)}" oninput="state.toolSearch=this.value;renderTools()">
            </div>
            ${state.selectedTarget ? `
                <div class="card" style="background:rgba(88,166,255,0.05);border-color:var(--accent);">
                    <div class="flex items-center justify-between">
                        <div> Target: <strong>${esc(state.selectedTarget.name)}</strong> <code>${esc(state.selectedTarget.host)}</code></div>
                        <button class="btn btn-sm" onclick="state.selectedTarget=null;renderTools()">Clear</button>
                    </div>
                </div>
            ` : ''}
            <div class="grid grid-3">
                ${tools.map(tool => `
                    <div class="tool-card" id="tool-${tool.id}" onclick="runTool('${tool.id}')">
                        <div class="icon">${tool.icon}</div>
                        <div class="name">${esc(tool.name)}</div>
                        <div class="desc">${esc(tool.description)}</div>
                        <span class="category-tag cat-${catClass(tool.category)}">${tool.category}</span>
                    </div>
                `).join('')}
            </div>
            <div id="tool-result" class="mt-16"></div>
        `;
    }

    // ── Run Tool ───────────────────────────────
    async function runTool(toolId) {
        if (!state.selectedTarget) {
            const targets = await api.get('/targets');
            if (!targets.targets?.length) { showAddTarget(); toast('Add a target first', 'error'); return; }
            showTargetPicker(toolId, targets.targets);
            return;
        }
        const card = document.getElementById(`tool-${toolId}`);
        if (card) { card.className = 'tool-card running'; }
        const resultDiv = document.getElementById('tool-result');
        if (resultDiv) resultDiv.innerHTML = `<div class="card"><div class="skeleton" style="width:60%"></div><div class="skeleton" style="width:80%"></div><div class="skeleton" style="width:40%"></div></div>`;

        const result = await api.post(`/tools/${toolId}/run`, { target: state.selectedTarget.host, params: {} });
        if (card) { card.className = `tool-card ${result.success ? 'success' : 'error'}`; const elapsed = card.querySelector('.elapsed'); if (!elapsed) { const e = document.createElement('span'); e.className='elapsed'; e.textContent=`${result.elapsed_seconds}s`; card.appendChild(e); } else { elapsed.textContent=`${result.elapsed_seconds}s`; } }

        if (resultDiv) {
            if (result.success) {
                resultDiv.innerHTML = `<div class="card"><div class="card-header"><div class="card-title">${result.success?'':''} ${toolId}</div><span style="font-size:12px;color:var(--text-muted)">${result.elapsed_seconds}s</span></div>${formatResult(toolId, result.result)}</div>`;
            } else {
                resultDiv.innerHTML = `<div class="card"><div class="card-header"><div class="card-title"> ${toolId} — Error</div></div><div class="result-panel"><pre style="color:var(--red)">${esc(result.error)}</pre></div></div>`;
            }
        }
        if (state.selectedTarget?.id) await api.post('/scans', { target_id: state.selectedTarget.id, tool: toolId });
    }

    // ── Result Formatter ───────────────────────
    function formatResult(toolId, data) {
        if (!data) return '<p style="color:var(--text-muted)">No data returned</p>';
        const formatters = {
            port_scanner: formatPortScanner,
            dns_recon: formatDnsRecon,
            subdomain_enum: formatSubdomains,
            http_probe: formatHttpProbe,
            whois_lookup: formatWhois,
            ping_sweep: formatPing,
            traceroute: formatTraceroute,
            ssl_analyzer: formatSSL,
            header_analyzer: formatHeaders,
            dir_fuzzer: formatDirFuzzer,
            sqli_scanner: formatSQLi,
            xss_scanner: formatXSS,
            cors_checker: formatCORS,
            tech_detector: formatTech,
            csp_analyzer: formatCSP,
            open_redirect: formatRedirect,
            cve_search: formatCVE,
            hash_checker: formatHash,
            password_audit: formatPassword,
            network_connections: formatNetConn,
            process_monitor: formatProcesses,
            system_info: formatSystemInfo,
        };
        const formatter = formatters[toolId];
        if (formatter) return formatter(data);
        return `<div class="result-panel"><pre>${esc(JSON.stringify(data, null, 2))}</pre></div>`;
    }

    function formatPortScanner(d) {
        if (!d.open_ports?.length) return `<div class="finding-card safe"><strong> No open ports found</strong> (scanned ${d.scanned_ports} ports in ${d.elapsed_seconds}s)</div>`;
        return `<div class="result-section"><h4> Open Ports (${d.open_count}/${d.scanned_ports})</h4>
            ${d.open_ports.map(p => `<div class="port-row"><span class="port-num">${p.port}</span><span class="port-state"><span class="tag tag-green">OPEN</span></span><span class="port-service">${esc(p.service)}</span></div>`).join('')}
        </div><div style="font-size:12px;color:var(--text-muted)">Scanned in ${d.elapsed_seconds}s</div>`;
    }

    function formatDnsRecon(d) {
        let html = `<div class="result-section"><h4> DNS Records for ${esc(d.domain)}</h4>`;
        for (const [type, records] of Object.entries(d.records || {})) {
            html += `<div style="margin-bottom:8px"><span class="tag tag-accent">${type}</span></div>`;
            html += records.map(r => `<div style="font-family:monospace;font-size:12px;padding:2px 0 2px 24px;color:var(--text-secondary)">${esc(r)}</div>`).join('');
        }
        if (d.reverse_dns?.length) {
            html += `<h4 style="margin-top:12px"> Reverse DNS</h4>`;
            html += d.reverse_dns.map(r => `<div class="kv-grid"><span class="key">${esc(r.ip)}</span><span class="value">${esc(r.hostname)}</span></div>`).join('');
        }
        return html + '</div>';
    }

    function formatSubdomains(d) {
        if (!d.subdomains_found?.length) return `<div class="finding-card safe"> No subdomains found (${d.wordlist_size} tested in ${d.elapsed_seconds}s)</div>`;
        return `<div class="result-section"><h4> Subdomains (${d.count} found)</h4>
            ${d.subdomains_found.map(s => `<div class="port-row"><span style="font-family:monospace;font-weight:600;min-width:200px">${esc(s.subdomain)}</span><span class="port-service">${esc(s.ip)}</span></div>`).join('')}
        </div><div style="font-size:12px;color:var(--text-muted)">${d.wordlist_size} tested in ${d.elapsed_seconds}s</div>`;
    }

    function formatHttpProbe(d) {
        const p = d.probes?.[0]; if (!p) return '<p>No probe data</p>';
        if (p.error) return `<div class="finding-card vuln"><strong> Connection failed:</strong> ${esc(p.error)}</div>`;
        return `<div class="result-section"><h4> HTTP Probe</h4><div class="kv-grid">
            <span class="key">URL</span><span class="value">${esc(p.url)}</span>
            <span class="key">Status</span><span class="value"><span class="tag ${p.status<400?'tag-green':'tag-red'}">${p.status}</span></span>
            <span class="key">Server</span><span class="value">${esc(p.server||'unknown')}</span>
            <span class="key">Content-Type</span><span class="value">${esc(p.content_type||'')}</span>
            <span class="key">Content Length</span><span class="value">${p.content_length||0} bytes</span>
        </div></div>
        ${p.technologies?.length ? `<div class="result-section"><h4> Technologies</h4><div>${p.technologies.map(t=>`<span class="tag">${esc(t)}</span>`).join(' ')}</div></div>` : ''}`;
    }

    function formatWhois(d) {
        if (d.error) return `<div class="finding-card vuln"> ${esc(d.error)}</div>`;
        if (d.raw) return `<div class="result-section"><h4> WHOIS Raw</h4><div class="result-panel"><pre>${esc(d.raw)}</pre></div></div>`;
        return `<div class="result-section"><h4> WHOIS ${esc(d.domain)}</h4><div class="kv-grid">
            <span class="key">Registrar</span><span class="value">${esc(d.registrar||'N/A')}</span>
            <span class="key">Created</span><span class="value">${esc(d.creation_date||'N/A')}</span>
            <span class="key">Expires</span><span class="value">${esc(d.expiration_date||'N/A')}</span>
            <span class="key">Organization</span><span class="value">${esc(d.org||'N/A')}</span>
            <span class="key">Country</span><span class="value">${esc(d.country||'N/A')}</span>
        </div></div>
        ${d.name_servers?.length ? `<div class="result-section"><h4>NS Records</h4>${d.name_servers.map(n=>`<span class="tag">${esc(n)}</span>`).join(' ')}</div>` : ''}`;
    }

    function formatPing(d) {
        return `<div class="finding-card ${d.alive?'safe':'vuln'}"><strong>${d.alive?' Host is alive':' Host unreachable'}</strong> — ${esc(d.host)}</div>
        ${d.stats?.summary ? `<div class="kv-grid mt-8"><span class="key">Summary</span><span class="value">${esc(d.stats.summary)}</span></div>` : ''}
        <div class="result-panel mt-8"><pre>${esc(d.output||'')}</pre></div>`;
    }

    function formatTraceroute(d) {
        if (!d.hops?.length) return `<div class="result-panel"><pre>${esc(d.raw_output||'No data')}</pre></div>`;
        return `<div class="result-section"><h4> Traceroute (${d.hop_count} hops)</h4>
            ${d.hops.map(h => `<div class="port-row"><span class="port-num">Hop ${h.hop}</span><span class="port-service">${h.ips?.join(', ')||'*'} ${h.times?.join(' ')||''}</span></div>`).join('')}
        </div>`;
    }

    function formatSSL(d) {
        if (d.error) return `<div class="finding-card vuln"> ${esc(d.error)}</div>`;
        return `<div class="result-section"><h4> SSL/TLS Certificate</h4><div class="kv-grid">
            <span class="key">Host</span><span class="value">${esc(d.host)}:${d.port}</span>
            <span class="key">TLS Version</span><span class="value"><span class="tag tag-green">${esc(d.tls_version)}</span></span>
            <span class="key">Cipher</span><span class="value">${esc(d.cipher_suite||'N/A')}</span>
            <span class="key">Bits</span><span class="value">${d.cipher_bits||'N/A'}</span>
            <span class="key">Valid</span><span class="value">${d.valid?'<span class="tag tag-green"> Yes</span>':'<span class="tag tag-red"> No</span>'}</span>
            <span class="key">Not Before</span><span class="value">${esc(d.not_before||'')}</span>
            <span class="key">Not After</span><span class="value">${esc(d.not_after||'')}</span>
        </div></div>
        ${d.subject ? `<div class="result-section"><h4>Subject</h4><div class="kv-grid">${Object.entries(d.subject).map(([k,v])=>`<span class="key">${esc(k)}</span><span class="value">${esc(v)}</span>`).join('')}</div></div>` : ''}
        ${d.issuer ? `<div class="result-section"><h4>Issuer</h4><div class="kv-grid">${Object.entries(d.issuer).map(([k,v])=>`<span class="key">${esc(k)}</span><span class="value">${esc(v)}</span>`).join('')}</div></div>` : ''}
        ${d.san?.length ? `<div class="result-section"><h4>Subject Alt Names</h4><div>${d.san.map(s=>`<span class="tag">${esc(s)}</span>`).join(' ')}</div></div>` : ''}`;
    }

    function formatHeaders(d) {
        if (d.error) return `<div class="finding-card vuln"> ${esc(d.error)}</div>`;
        const gradeClass = d.grade?.startsWith('A')?'grade-A':d.grade==='B'?'grade-B':d.grade==='C'?'grade-C':d.grade==='D'?'grade-D':'grade-F';
        let html = `<div class="flex items-center gap-16 mb-16"><div class="grade-badge ${gradeClass}">${esc(d.grade)}</div><div><div style="font-size:18px;font-weight:700">Security Grade: ${esc(d.grade)}</div><div style="color:var(--text-secondary)">${esc(d.score)} headers present</div></div></div>`;
        if (d.security_headers_present?.length) {
            html += `<div class="result-section"><h4> Present (${d.security_headers_present.length})</h4>`;
            html += d.security_headers_present.map(h => `<div class="finding-card safe"><strong>${esc(h.header)}</strong><div style="font-size:12px;color:var(--text-secondary)">${esc(h.description)}</div><div style="font-family:monospace;font-size:11px;margin-top:4px;color:var(--text-muted)">${esc(h.value)}</div></div>`).join('');
            html += '</div>';
        }
        if (d.security_headers_missing?.length) {
            html += `<div class="result-section"><h4> Missing (${d.security_headers_missing.length})</h4>`;
            html += d.security_headers_missing.map(h => `<div class="finding-card vuln"><strong>${esc(h.header)}</strong><div style="font-size:12px;color:var(--text-secondary)">${esc(h.description)}</div><div style="font-size:11px;color:var(--yellow);margin-top:4px"> ${esc(h.recommendation)}</div></div>`).join('');
            html += '</div>';
        }
        if (d.information_leakage?.length) {
            html += `<div class="result-section"><h4> Information Leakage</h4>`;
            html += d.information_leakage.map(h => `<div class="finding-card warn"><strong>${esc(h.header)}</strong>: ${esc(h.value)}<div style="font-size:12px;color:var(--text-secondary)">${esc(h.risk)}</div></div>`).join('');
            html += '</div>';
        }
        return html;
    }

    function formatDirFuzzer(d) {
        if (!d.found?.length) return `<div class="finding-card safe"> No directories found (${d.wordlist_size} paths tested in ${d.elapsed_seconds}s)</div>`;
        return `<div class="result-section"><h4> Found ${d.count} paths</h4>
            <table><thead><tr><th>Status</th><th>Path</th><th>Size</th><th>Type</th></tr></thead><tbody>
            ${d.found.map(f => `<tr><td><span class="tag ${f.status<300?'tag-green':f.status<400?'tag-yellow':'tag-red'}">${f.status}</span></td><td style="font-family:monospace">${esc(f.path)}</td><td>${f.size||0}</td><td style="font-size:12px;color:var(--text-muted)">${esc(f.content_type?.split(';')[0]||'')}</td></tr>`).join('')}
            </tbody></table>
        </div><div style="font-size:12px;color:var(--text-muted)">${d.wordlist_size} tested in ${d.elapsed_seconds}s</div>`;
    }

    function formatSQLi(d) {
        if (d.reason) return `<div class="finding-card safe">ℹ ${esc(d.reason)}</div>`;
        if (!d.vulnerable) return `<div class="finding-card safe"> No SQL injection vulnerabilities detected</div>`;
        return `<div class="finding-card vuln"><strong> Potential SQLi vulnerabilities found (${d.finding_count})</strong></div>
        <div class="result-section mt-8">${d.findings.map(f => `<div class="finding-card vuln"><strong>Parameter:</strong> ${esc(f.parameter)}<br><strong>Type:</strong> ${esc(f.type)}<br><strong>Payload:</strong> <code>${esc(f.payload)}</code><br><strong>Evidence:</strong> ${esc(f.evidence)}</div>`).join('')}</div>`;
    }

    function formatXSS(d) {
        if (d.reason) return `<div class="finding-card safe">ℹ ${esc(d.reason)}</div>`;
        if (!d.vulnerable) return `<div class="finding-card safe"> No reflected XSS detected</div>`;
        return `<div class="finding-card vuln"><strong> Reflected XSS found (${d.finding_count})</strong></div>
        <div class="result-section mt-8">${d.findings.map(f => `<div class="finding-card vuln"><strong>Parameter:</strong> ${esc(f.parameter)}<br><strong>Payload:</strong> <code>${esc(f.payload)}</code></div>`).join('')}</div>`;
    }

    function formatCORS(d) {
        return `<div class="finding-card ${d.vulnerable?'vuln':'safe'}"><strong>${d.vulnerable?' CORS misconfigurations detected':' CORS configuration looks safe'}</strong></div>
        <div class="result-section mt-8">${(d.tests||[]).map(t => `<div class="finding-card ${t.vulnerable?'vuln':t.risk==='medium'?'warn':'safe'}"><strong>${esc(t.test)}</strong> — Origin: <code>${esc(t.origin_sent)}</code><br>ACAO: <code>${esc(t.acao)}</code> | ACAC: <code>${esc(t.acac)}</code>${t.vulnerable?`<br><span class="tag tag-red">VULNERABLE — ${esc(t.risk)} risk</span>`:''}</div>`).join('')}</div>`;
    }

    function formatTech(d) {
        if (d.error) return `<div class="finding-card vuln"> ${esc(d.error)}</div>`;
        let html = `<div class="kv-grid mb-16"><span class="key">Server</span><span class="value">${esc(d.server)}</span><span class="key">Technologies</span><span class="value">${d.total_detected} detected</span></div>`;
        for (const [cat, techs] of Object.entries(d.technologies || {})) {
            html += `<div class="result-section"><h4>${esc(cat)}</h4><div>${techs.map(t=>`<span class="tag tag-accent">${esc(t)}</span>`).join(' ')}</div></div>`;
        }
        return html;
    }

    function formatCSP(d) {
        if (!d.has_csp) return `<div class="finding-card vuln"><strong> No CSP header found</strong><div style="font-size:12px;color:var(--text-secondary);margin-top:4px">Content-Security-Policy header is missing</div></div>`;
        const gradeClass = d.grade?.startsWith('A')?'grade-A':d.grade==='B'?'grade-B':d.grade==='C'?'grade-C':'grade-F';
        let html = `<div class="flex items-center gap-16 mb-16"><div class="grade-badge ${gradeClass}">${esc(d.grade)}</div><div><div style="font-size:18px;font-weight:700">CSP Score: ${d.score}/100</div>${d.is_report_only?'<div class="tag tag-yellow">Report-Only</div>':''}</div></div>`;
        if (d.issues?.length) html += `<div class="result-section"><h4> Issues</h4>${d.issues.map(i=>`<div class="finding-card warn">${esc(i)}</div>`).join('')}</div>`;
        if (d.policy) html += `<div class="result-section"><h4>Policy</h4><div class="result-panel"><pre style="font-size:11px">${esc(d.policy)}</pre></div></div>`;
        return html;
    }

    function formatRedirect(d) {
        if (d.reason) return `<div class="finding-card safe">ℹ ${esc(d.reason)}</div>`;
        if (!d.vulnerable) return `<div class="finding-card safe"> No open redirect vulnerabilities detected</div>`;
        return `<div class="finding-card vuln"><strong> Open redirect found (${d.finding_count})</strong></div>
        <div class="result-section mt-8">${d.findings.map(f => `<div class="finding-card vuln"><strong>Parameter:</strong> ${esc(f.parameter)}<br><strong>Payload:</strong> <code>${esc(f.payload)}</code><br><strong>Redirects to:</strong> <code style="color:var(--red)">${esc(f.redirect_to)}</code></div>`).join('')}</div>`;
    }

    function formatCVE(d) {
        if (d.error) return `<div class="finding-card vuln"> ${esc(d.error)}</div>`;
        if (!d.cves?.length) return `<div class="finding-card safe">No CVEs found for "${esc(d.query)}"</div>`;
        return `<div class="result-section"><h4> CVE Results (${d.total_results} total, showing ${d.count})</h4>
            ${d.cves.map(c => {
                const sevClass = c.severity==='CRITICAL'?'sev-critical':c.severity==='HIGH'?'sev-high':c.severity==='MEDIUM'?'sev-medium':'sev-low';
                return `<div class="cve-card"><span class="cve-score ${sevClass}">${c.cvss_score||'N/A'}</span><span class="cve-id">${esc(c.id)}</span><span class="tag ${sevClass}" style="margin-left:8px">${esc(c.severity||'N/A')}</span><div class="cve-desc">${esc(c.description)}</div><div style="font-size:11px;color:var(--text-muted);margin-top:4px">Published: ${esc(c.published?.split('T')[0]||'')}</div></div>`;
            }).join('')}
        </div>`;
    }

    function formatHash(d) {
        let html = `<div class="kv-grid mb-16"><span class="key">Hash</span><span class="value" style="font-size:12px">${esc(d.hash)}</span><span class="key">Type</span><span class="value">${esc(d.hash_type)}</span></div>`;
        for (const [source, info] of Object.entries(d.sources || {})) {
            if (info.error) html += `<div class="finding-card warn"><strong>${esc(source)}</strong>: ${esc(info.error)}</div>`;
            else if (info.found === false) html += `<div class="finding-card safe"><strong>${esc(source)}</strong>: Not found</div>`;
            else if (info.found) html += `<div class="finding-card vuln"><strong>${esc(source)}</strong>:  Found! ${JSON.stringify(info.data||info).substring(0,200)}</div>`;
            else html += `<div class="finding-card"><strong>${esc(source)}</strong>: ${JSON.stringify(info)}</div>`;
        }
        return html;
    }

    function formatPassword(d) {
        const scoreNum = parseInt(d.score) || 0;
        const maxScore = 11;
        const pct = (scoreNum/maxScore)*100;
        const color = pct>=80?'var(--green)':pct>=60?'var(--accent)':pct>=40?'var(--yellow)':pct>=20?'var(--orange)':'var(--red)';
        let html = `<div class="flex items-center gap-16 mb-16"><div style="font-size:28px;font-weight:700;color:${color}">${esc(d.strength)}</div><div><div style="font-size:14px">Score: ${esc(d.score)}</div><div class="strength-bar" style="width:200px"><div class="strength-fill" style="width:${pct}%;background:${color}"></div></div></div></div>`;
        html += `<div class="kv-grid mb-16">`;
        const a = d.analysis||{};
        html += `<span class="key">Length</span><span class="value">${a.length} chars</span>`;
        html += `<span class="key">Uppercase</span><span class="value">${a.has_uppercase?'<span class="tag tag-green">Yes</span>':'<span class="tag tag-red">No</span>'}</span>`;
        html += `<span class="key">Lowercase</span><span class="value">${a.has_lowercase?'<span class="tag tag-green">Yes</span>':'<span class="tag tag-red">No</span>'}</span>`;
        html += `<span class="key">Digits</span><span class="value">${a.has_digits?'<span class="tag tag-green">Yes</span>':'<span class="tag tag-red">No</span>'}</span>`;
        html += `<span class="key">Special</span><span class="value">${a.has_special?'<span class="tag tag-green">Yes</span>':'<span class="tag tag-red">No</span>'}</span>`;
        html += `<span class="key">Entropy</span><span class="value">${a.entropy} bits</span>`;
        html += `<span class="key">Common</span><span class="value">${a.is_common?'<span class="tag tag-red"> Yes</span>':'<span class="tag tag-green">No</span>'}</span>`;
        if (d.breached_count !== null) html += `<span class="key">Breached</span><span class="value">${d.breached?`<span class="tag tag-red"> ${d.breached_count.toLocaleString()} times</span>`:'<span class="tag tag-green">Not found</span>'}</span>`;
        html += '</div>';
        if (d.recommendations?.length) html += `<div class="result-section"><h4> Recommendations</h4>${d.recommendations.map(r=>`<div class="finding-card warn">${esc(r)}</div>`).join('')}</div>`;
        return html;
    }

    function formatNetConn(d) {
        let html = `<div class="stats-row"><div class="stat-card accent"><div class="value">${d.total_connections}</div><div class="label">Total</div></div><div class="stat-card green"><div class="value">${d.listening}</div><div class="label">Listening</div></div><div class="stat-card yellow"><div class="value">${d.established}</div><div class="label">Established</div></div></div>`;
        if (d.listening_ports?.length) {
            html += `<div class="result-section"><h4> Listening Ports</h4><table><thead><tr><th>Protocol</th><th>Local Address</th><th>PID</th></tr></thead><tbody>`;
            html += d.listening_ports.map(c => `<tr><td>${esc(c.protocol)}</td><td style="font-family:monospace">${esc(c.local_address)}</td><td>${c.pid}</td></tr>`).join('');
            html += '</tbody></table></div>';
        }
        return html;
    }

    function formatProcesses(d) {
        let html = `<div class="stat-card accent mb-16" style="display:inline-block"><div class="value">${d.total_processes}</div><div class="label">Running Processes</div></div>`;
        if (d.processes_with_ports?.length) {
            html += `<div class="result-section"><h4> Processes with Listening Ports</h4>`;
            html += d.processes_with_ports.map(p => `<div class="finding-card"><strong>${esc(p.name)}</strong> (PID: ${p.pid})<br><span style="font-family:monospace;font-size:12px">${(p.listening_ports||[]).join(', ')}</span></div>`).join('');
            html += '</div>';
        }
        if (d.top_by_memory?.length) {
            html += `<div class="result-section"><h4> Top by Memory</h4><table><thead><tr><th>Process</th><th>PID</th><th>Memory</th></tr></thead><tbody>`;
            html += d.top_by_memory.slice(0,15).map(p => `<tr><td>${esc(p.name)}</td><td>${p.pid}</td><td>${(p.memory_kb/1024).toFixed(1)} MB</td></tr>`).join('');
            html += '</tbody></table></div>';
        }
        return html;
    }

    function formatSystemInfo(d) {
        let html = '';
        if (d.os) {
            html += `<div class="result-section"><h4> Operating System</h4><div class="kv-grid">
                <span class="key">System</span><span class="value">${esc(d.os.system)} ${esc(d.os.release)}</span>
                <span class="key">Version</span><span class="value">${esc(d.os.version)}</span>
                <span class="key">Machine</span><span class="value">${esc(d.os.machine)}</span>
                <span class="key">Hostname</span><span class="value">${esc(d.os.hostname)}</span>
            </div></div>`;
        }
        if (d.network) {
            html += `<div class="result-section"><h4> Network</h4><div class="kv-grid">`;
            if (d.network.local_ip) { html += `<span class="key">Local IP</span><span class="value">${esc(d.network.local_ip)}</span>`; }
            if (d.network.public_ip) { html += `<span class="key">Public IP</span><span class="value">${esc(d.network.public_ip)}</span>`; }
            html += '</div></div>';
        }
        if (d.security) {
            html += `<div class="result-section"><h4> Security Posture</h4><div class="kv-grid">`;
            html += `<span class="key">Firewall</span><span class="value">${d.security.firewall==='ON'?'<span class="tag tag-green">ON</span>':'<span class="tag tag-red">OFF</span>'}</span>`;
            if (d.security.defender_enabled !== undefined) html += `<span class="key">Defender</span><span class="value">${d.security.defender_enabled?'<span class="tag tag-green">Enabled</span>':'<span class="tag tag-red">Disabled</span>'}</span>`;
            if (d.security.realtime_protection !== undefined) html += `<span class="key">Real-time</span><span class="value">${d.security.realtime_protection?'<span class="tag tag-green">On</span>':'<span class="tag tag-red">Off</span>'}</span>`;
            if (d.security.uac) html += `<span class="key">UAC</span><span class="value">${d.security.uac==='Enabled'?'<span class="tag tag-green">Enabled</span>':'<span class="tag tag-red">Disabled</span>'}</span>`;
            html += '</div></div>';
        }
        if (d.disk) {
            html += `<div class="result-section"><h4> Disk</h4><div class="kv-grid">
                <span class="key">Total</span><span class="value">${d.disk.total_gb} GB</span>
                <span class="key">Used</span><span class="value">${d.disk.used_gb} GB (${d.disk.usage_percent}%)</span>
                <span class="key">Free</span><span class="value">${d.disk.free_gb} GB</span>
            </div><div class="progress-bar mt-8"><div class="progress-fill" style="width:${d.disk.usage_percent}%;background:${d.disk.usage_percent>90?'var(--red)':d.disk.usage_percent>70?'var(--yellow)':'var(--green)'}"></div></div></div>`;
        }
        if (d.memory) {
            html += `<div class="result-section"><h4>🧠 Memory</h4><div class="kv-grid">
                <span class="key">Total</span><span class="value">${d.memory.total_gb} GB</span>
                <span class="key">Available</span><span class="value">${d.memory.available_gb} GB</span>
                ${d.memory.usage_percent?`<span class="key">Usage</span><span class="value">${d.memory.usage_percent}%</span>`:''}
            </div></div>`;
        }
        return html;
    }

    function showTargetPicker(toolId, targets) {
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.innerHTML = `
            <div class="modal">
                <h3> Select Target</h3>
                ${targets.map(t => `
                    <div class="target-item" style="cursor:pointer" onclick="selectTargetAndRun(${t.id},'${esc(t.name)}','${esc(t.host)}','${toolId}')">
                        <div><div class="name">${esc(t.name)}</div><div class="host">${esc(t.host)}</div></div>
                    </div>
                `).join('')}
                <div class="modal-actions mt-16">
                    <button class="btn" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
                    <button class="btn btn-primary" onclick="this.closest('.modal-overlay').remove();showAddTarget()">Add New</button>
                </div>
            </div>
        `;
        document.body.appendChild(overlay);
    }

    function selectTargetAndRun(id, name, host, toolId) {
        state.selectedTarget = {id, name, host};
        document.querySelector('.modal-overlay')?.remove();
        runTool(toolId);
    }

    // ── Pipeline ───────────────────────────────
    async function renderPipelinePage() {
        const content = document.getElementById('content');
        const [targets, history] = await Promise.all([api.get('/targets'), api.get('/pipelines/history')]);

        content.innerHTML = `
            <div class="card">
                <div class="card-header"><div class="card-title"> Pipeline Engine</div></div>
                <p style="font-size:13px;color:var(--text-secondary);margin-bottom:16px">Multi-phase automated security scans. Select a mode and target to start.</p>
                <div class="grid grid-3 mb-16">
                    <div class="pipeline-card" data-mode="fast" onclick="selectPipeline('fast')">
                        <div class="pip-icon"></div><div class="pip-name">Fast</div><div class="pip-desc">Quick recon + port scan (~1 min)</div>
                    </div>
                    <div class="pipeline-card" data-mode="deep" onclick="selectPipeline('deep')">
                        <div class="pip-icon"></div><div class="pip-name">Deep</div><div class="pip-desc">Full recon + web analysis (~3 min)</div>
                    </div>
                    <div class="pipeline-card" data-mode="nuclear" onclick="selectPipeline('nuclear')">
                        <div class="pip-icon"></div><div class="pip-name">Nuclear</div><div class="pip-desc">Comprehensive security audit (~10 min)</div>
                    </div>
                </div>
                <div id="pipeline-phases" class="hidden"></div>
                <div class="flex gap-8 items-center mt-16">
                    <select id="pipeline-target" style="flex:1"><option value="">Select target...</option>${(targets.targets||[]).map(t => `<option value="${t.id}">${esc(t.name)} (${esc(t.host)})</option>`).join('')}</select>
                    <button class="btn btn-primary" id="run-pipeline-btn" onclick="startPipeline()" disabled> Start Pipeline</button>
                </div>
            </div>
            <div id="pipeline-progress" class="hidden"></div>
            ${history.pipelines?.length ? `
                <div class="card mt-16">
                    <div class="card-header"><div class="card-title"> Pipeline History</div></div>
                    <table><thead><tr><th>Mode</th><th>Target</th><th>Status</th><th>Started</th><th>Actions</th></tr></thead><tbody>
                        ${history.pipelines.map(p => `<tr><td>${p.mode}</td><td>${esc(p.target_name||'')}</td><td><span class="badge-status badge-${p.status}">${p.status}</span></td><td>${p.started_at||''}</td><td class="flex gap-8"><button class="btn btn-sm" onclick="viewPipelineResult(${p.id})">View</button> <button class="btn btn-sm" onclick="downloadJSON('/api/pipelines/${p.id}/export/json', 'pipeline_${p.id}.json')">JSON</button> <button class="btn btn-sm" onclick="downloadPDF('/api/pipelines/${p.id}/export/pdf', 'pipeline_${p.id}.pdf')">PDF</button> <button class="btn btn-sm btn-danger" onclick="deletePipeline(${p.id})">Del</button></td></tr>`).join('')}
                    </tbody></table>
                </div>
            ` : ''}
        `;
    }

    let selectedPipelineMode = null;

    function selectPipeline(mode) {
        selectedPipelineMode = mode;
        document.querySelectorAll('.pipeline-card').forEach(c => c.classList.remove('selected'));
        document.querySelector(`[data-mode="${mode}"]`)?.classList.add('selected');
        document.getElementById('run-pipeline-btn').disabled = false;
        const phases = {
            fast: [{name:'Recon',tools:['Whois','DNS','HTTP Probe']},{name:'Scan',tools:['Port Scanner']}],
            deep: [{name:'Recon',tools:['Whois','DNS','Subdomain','HTTP Probe']},{name:'Scan',tools:['Port Scanner','SSL']},{name:'Web',tools:['Headers','Tech Detect','Dir Fuzzer']}],
            nuclear: [{name:'Recon',tools:['Whois','DNS','Subdomain','HTTP Probe']},{name:'Scan',tools:['Port Scanner','SSL']},{name:'Web',tools:['Headers','Tech','Dir Fuzzer','SQLi','XSS','CORS','CSP','Open Redirect']},{name:'Vuln',tools:['CVE Search','Password Audit']},{name:'System',tools:['Net Connections','Processes','System Info']}],

        phasesDiv.className = '';

    async function startPipeline() {
        if (!selectedPipelineMode) return;
        const targetSelect = document.getElementById('pipeline-target');
        if (!targetSelect.value) { toast('Select a target', 'error'); return; }
        const result = await api.post('/pipelines', { target_id: parseInt(targetSelect.value), mode: selectedPipelineMode });
        if (result.pipeline_id) { toast(`Pipeline started (ID: ${result.pipeline_id})`, 'success'); pollPipeline(result.pipeline_id); }
    }

    async function pollPipeline(id) {
        const progressDiv = document.getElementById('pipeline-progress');
        progressDiv.className = '';
        progressDiv.innerHTML = `<div class="card"><div class="card-title mb-8"> Pipeline Running...</div><div class="progress-bar"><div class="progress-fill" id="pip-progress" style="width:0%"></div></div><div id="pip-status" style="font-size:12px;color:var(--text-secondary);margin-top:8px">Starting...</div></div>`;
        const poll = setInterval(async () => {
            const data = await api.get(`/pipelines/${id}/result`);
            if (data.status === 'completed' || data.status === 'failed') {
                clearInterval(poll);
                document.getElementById('pip-progress').style.width = '100%';
                document.getElementById('pip-status').textContent = 'Completed!';
                toast('Pipeline completed!', 'success');
                renderPipelinePage();
            }
        }, 2000);
    }

        const data = await api.get(`/pipelines/${id}/result`);
        const content = document.getElementById('content');
        content.innerHTML = `<button class="btn mb-16" onclick="renderPipelinePage()">Back</button>

                </div>
                <div class="input-group"><label>Host</label><input type="text" id="proxy-host" value="${esc(config.host||'127.0.0.1')}"></div>
                <div class="input-group"><label>Port</label><input type="number" id="proxy-port" value="${config.port||tor.port||9150}"></div>
                <div class="input-group"><label>Username (optional)</label><input type="text" id="proxy-user" value="${esc(config.username||'')}"></div>
                <div class="input-group"><label>Password (optional)</label><input type="text" id="proxy-pass" value="${esc(config.password||'')}"></div>
                <div class="flex gap-8 mt-16">
                    <button class="btn btn-primary" onclick="saveProxy()">Save</button>
                    <button class="btn" onclick="testTorIP()">Test TOR IP</button>
                </div>
                <div id="proxy-result" class="mt-16"></div>
            </div>
            <div class="card">
                <div class="card-header"><div class="card-title">How it works</div></div>
                <div style="font-size:13px;line-height:1.8">
                    <p>When proxy is <strong>enabled</strong>, all HTTP-based tools (web, OSINT, vuln) route through the configured proxy.</p>
                    <p><strong>TOR</strong>: Routes through the TOR network. Requires TOR Browser or tor service running.</p>
                    <p><strong>SOCKS5</strong>: Use with any VPN that provides SOCKS5 (Mullvad, NordVPN, etc.).</p>
                    <p><strong>Note</strong>: System tools (port scanner, ping, netstat) use direct connections.</p>
                    <p><strong>Tip</strong>: For full traffic isolation like network namespaces (Linux), run sec-dashboard inside a VM or container routed through VPN.</p>
                </div>
            </div>
            <div class="card">
                <div class="card-header"><div class="card-title">Cloudflare Tunnel (expose dashboard)</div></div>
                <div style="font-size:13px;line-height:1.8">
                    <p>To expose this dashboard securely without opening ports:</p>
                    <p><strong>1.</strong> Install: <code>winget install Cloudflare.cloudflared</code></p>
                    <p><strong>2.</strong> Run: <code>cloudflared tunnel --url http://localhost:8444</code></p>
                    <p><strong>3.</strong> You get a public HTTPS URL like <code>https://random-name.trycloudflare.com</code></p>
                    <p>Free tunnel with HTTPS. No account needed for quick tunnels.</p>
                    <p>For persistent tunnels: <code>cloudflared tunnel login</code> then configure in Cloudflare Zero Trust.</p>
                </div>
            </div>
        `;
    }

    async function saveProxy() {
        const config = {
            enabled: document.getElementById('proxy-type').value !== 'none',
            type: document.getElementById('proxy-type').value,
            host: document.getElementById('proxy-host').value,
            port: parseInt(document.getElementById('proxy-port').value) || 9050,
            username: document.getElementById('proxy-user').value,
            password: document.getElementById('proxy-pass').value,
        };
        await api.post('/proxy', config);
        toast('Proxy settings saved', 'success');
        renderProxy();
    }

    async function testTorIP() {
        const resultDiv = document.getElementById('proxy-result');
        resultDiv.innerHTML = '<div class="skeleton" style="width:200px"></div>';
        const data = await api.get('/proxy/tor-ip');
        if (data.tor_ip) {
            resultDiv.innerHTML = '<div class="finding-card safe">TOR Exit IP: <strong>' + esc(data.tor_ip) + '</strong></div>';
        } else {
            resultDiv.innerHTML = '<div class="finding-card vuln">Error: ' + esc(data.error || 'Could not connect') + '</div>';
        }
    }

    // Init
    connectWS();
    navigate('dashboard');
    </script>
</body>
</html>
